site_name: R Mastery Path
site_description: A structured, module-wise R training program from entry level to master level, focused on data analysis and statistics.
site_url: https://sigilipelli.github.io/r-mastery-path/
repo_url: https://github.com/SIGILIPELLI/r-mastery-path
repo_name: r-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Script": level-1/01-setup.md
      - "02 · Variables & Types": level-1/02-variables-types.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Functions": level-1/04-functions.md
      - "05 · Vectors & Basic Data Structures": level-1/05-vectors-data-structures.md
      - "06 · Data Frames Basics": level-1/06-data-frames-basics.md
      - "07 · Reading Data": level-1/07-reading-data.md
      - "08 · Basic Plotting": level-1/08-basic-plotting.md
      - "09 · Packages": level-1/09-packages.md
      - "10 · Project — Data Analysis Script": level-1/10-project-data-analysis.md
  - "Level 2 · Intermediate":
